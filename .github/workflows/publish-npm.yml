name: Publish to npm

on:
  push:
    tags:
      - 'node-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. node-v0.8.6). Defaults to the current ref.'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify @libp2p/utils onProgress guard patch applied
        # Sentry check: our vendored patch under patches/ inserts a
        # PROPAGATING WeakMap guard around Job.run()'s onProgress
        # lambda to break a cross-Job recursion that produces
        # RangeError: Maximum call stack size exceeded. If a future
        # @libp2p/utils version bump silently invalidates the patch,
        # patch-package warns and continues (exit 0) and we'd ship
        # the bug. This step grep-asserts the marker is present in
        # the installed file. Update or drop once libp2p ships its
        # own fix (tracked in libp2p/js-libp2p#3496).
        run: |
          JOB_FILE=$(node -e "console.log(require.resolve('@libp2p/utils/dist/src/queue/job.js'))")
          if ! grep -q 'PROPAGATING' "$JOB_FILE"; then
            echo "::error::patch-package guard missing from $JOB_FILE - check patches/@libp2p+utils+*.patch against the installed version"
            exit 1
          fi

      - name: Build
        run: pnpm run build

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#node-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Check if version already published
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          # Probe BOTH the metadata endpoint (npm view) AND the tarball
          # endpoint (HEAD on the registry tarball URL). The tarball CDN
          # propagates faster than `npm view`'s metadata cache, so a
          # manual publish that just landed is reliably observable via
          # HEAD even when `npm view` still 404s. Retry up to 6 times
          # with 15 s backoff so we ride through any registry lag.
          TARBALL_NAME="$(echo "$PKG_NAME" | sed 's|@||;s|/|-|g')-${PKG_VERSION}.tgz"
          TARBALL_URL="https://registry.npmjs.org/${PKG_NAME}/-/${TARBALL_NAME}"
          for i in 1 2 3 4 5 6; do
            if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
              echo "already=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Version $PKG_VERSION already on registry (npm view, attempt $i)"
              exit 0
            fi
            if curl --silent --head --fail "$TARBALL_URL" >/dev/null 2>&1; then
              echo "already=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Tarball for $PKG_VERSION already on CDN (HEAD, attempt $i)"
              exit 0
            fi
            if [ "$i" -lt 6 ]; then
              echo "Not yet on registry (attempt $i), retrying in 15s…"
              sleep 15
            fi
          done
          echo "already=false" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.check.outputs.already != 'true'
        run: |
          # Tolerate "version already published" races: a manual publish
          # that landed between the check above and this step would 409
          # / 403 / 404 here. Treat any of those as success.
          set +e
          OUT=$(npm publish --access public --provenance 2>&1)
          STATUS=$?
          echo "$OUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUT" | grep -qiE 'cannot publish over .* previously published|already published|EPUBLISHCONFLICT|EVERSIONALREADYEXISTS|previously released|409|403|404'; then
              echo "::notice::Detected already-published response from registry — exiting success"
              exit 0
            fi
            exit $STATUS
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
